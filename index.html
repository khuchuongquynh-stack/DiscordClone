<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Voice Game</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">

    <h1>🎮 Voice Game</h1>

    <input id="username" placeholder="Nhập tên của bạn">

    <button id="joinBtn">
        Vào Game
    </button>

</div>

<div id="app" style="display:none;">

<div id="left">

<h2>👤 Người dùng</h2>

<div id="myName"></div>

<hr>

<h3>🔍 Tìm bạn</h3>

<input id="search" placeholder="Tên bạn">

<button id="findBtn">
Tìm
</button>

<hr>

<h3>Bạn bè</h3>

<div id="friends">

</div>

</div>

<div id="center">

<h2>💬 Chat</h2>

<div id="messages"></div>

<div id="send">

<input
id="message"
placeholder="Nhập tin nhắn..."
>

<button id="sendBtn">
Gửi
</button>

</div>

</div>

<div id="right">

<h2>🎤 Voice</h2>

<button id="micBtn">

Bật Micro

</button>

<br><br>

<button id="callBtn">

Gọi

</button>

<br><br>

<button id="leaveBtn">

Rời phòng

</button>

<hr>

<h3>Trạng thái</h3>

<div id="status">

Offline

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
